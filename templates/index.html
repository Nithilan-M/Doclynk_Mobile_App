<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DocLynk - Professional Healthcare Management{% endblock %}</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">

  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'inter': ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            },
            dark: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              600: '#475569',
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Professional dark background */
    .dark-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 50%, #0f172a 100%);
      min-height: 100vh;
    }
  </style>
</head>

<body class="dark-bg min-h-screen flex flex-col text-slate-100">
  <!-- Header -->
  <header class="border-b border-slate-700/50 sticky top-0 z-50 bg-slate-900/95 backdrop-blur-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <!-- Logo -->
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-primary-500 rounded-lg flex items-center justify-center">
            <i class="fas fa-heartbeat text-white text-lg"></i>
          </div>
          <h1 class="text-xl font-bold text-white">DocLynk</h1>
        </div>

        <!-- Navigation -->
        <nav class="flex items-center space-x-3">
          {% if session.get('role') %}
          <div class="flex items-center space-x-2 text-slate-300 mr-2">
            <i class="fas fa-user-circle"></i>
            <span class="font-medium text-sm">{{ session.get('name', 'User') }}</span>
          </div>
          {% if session.get('is_admin') %}
          <a href="{{ url_for('admin_dashboard') }}"
            class="inline-flex items-center px-3 py-2 bg-slate-700 text-white text-sm font-medium rounded-lg hover:bg-slate-600 transition-colors">
            <i class="fas fa-shield-alt mr-2 text-xs"></i>Admin
          </a>
          {% endif %}
          <a href="{{ url_for('logout') }}"
            class="inline-flex items-center px-3 py-2 bg-red-500/10 text-red-400 text-sm font-medium rounded-lg hover:bg-red-500/20 transition-colors border border-red-500/30">
            <i class="fas fa-sign-out-alt mr-2 text-xs"></i>Logout
          </a>
          {% else %}
          <a href="{{ url_for('login') }}"
            class="inline-flex items-center px-3 py-2 text-slate-300 text-sm font-medium rounded-lg hover:bg-slate-800 transition-colors">
            <i class="fas fa-sign-in-alt mr-2 text-xs"></i>Login
          </a>
          <a href="{{ url_for('register') }}"
            class="inline-flex items-center px-3 py-2 bg-primary-500 text-white text-sm font-medium rounded-lg hover:bg-primary-600 transition-colors">
            <i class="fas fa-user-plus mr-2 text-xs"></i>Register
          </a>
          {% endif %}
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 py-8">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-700/50 py-6 bg-slate-900/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="text-center text-slate-500 text-sm">
        <p>&copy; 2026 DocLynk:) All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>

</html>
