{% extends 'index.html' %}
{% block title %}Select Your Role - Doc_Lynk{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-500 rounded-xl mb-4">
                <i class="fas fa-user-tag text-white text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-1">Welcome, {{ name }}!</h2>
            <p class="text-slate-400 text-sm">One more step - please tell us who you are</p>
        </div>

        <!-- Role Selection -->
        <form method="post" action="{{ url_for('complete_oauth_registration') }}" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Doctor Option -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="role" value="doctor" class="peer sr-only" required>
                    <div class="p-6 bg-slate-800 border-2 border-slate-600 rounded-xl text-center transition-all 
                      peer-checked:border-primary-500 peer-checked:bg-primary-500/10 hover:border-slate-500">
                        <div class="w-14 h-14 mx-auto mb-4 bg-primary-500 rounded-xl flex items-center justify-center">
                            <i class="fas fa-user-md text-white text-xl"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">I'm a Doctor</h3>
                        <p class="text-slate-400 text-xs">Manage appointments and provide healthcare services</p>
                    </div>
                    <div
                        class="absolute top-3 right-3 w-5 h-5 rounded-full border-2 border-slate-500 peer-checked:bg-primary-500 peer-checked:border-primary-500 flex items-center justify-center">
                        <i class="fas fa-check text-white text-xs hidden peer-checked:block"></i>
                    </div>
                </label>

                <!-- Patient Option -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="role" value="patient" class="peer sr-only">
                    <div class="p-6 bg-slate-800 border-2 border-slate-600 rounded-xl text-center transition-all 
                      peer-checked:border-green-500 peer-checked:bg-green-500/10 hover:border-slate-500">
                        <div class="w-14 h-14 mx-auto mb-4 bg-green-500 rounded-xl flex items-center justify-center">
                            <i class="fas fa-user text-white text-xl"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-2">I'm a Patient</h3>
                        <p class="text-slate-400 text-xs">Book appointments and connect with doctors</p>
                    </div>
                    <div
                        class="absolute top-3 right-3 w-5 h-5 rounded-full border-2 border-slate-500 peer-checked:bg-green-500 peer-checked:border-green-500 flex items-center justify-center">
                        <i class="fas fa-check text-white text-xs hidden peer-checked:block"></i>
                    </div>
                </label>
            </div>

            <!-- Continue Button -->
            <button type="submit"
                class="w-full py-3 bg-primary-500 text-white font-medium rounded-lg hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all">
                Continue to Dashboard
            </button>
        </form>

        <!-- Info -->
        <div class="text-center mt-6">
            <p class="text-slate-500 text-xs">
                <i class="fas fa-info-circle mr-1"></i>
                This selection cannot be changed later. Please choose carefully.
            </p>
        </div>
    </div>
</div>

<style>
    input[type="radio"]:checked+div {
        transform: scale(1.02);
    }

    input[type="radio"]:checked~div .fa-check {
        display: block !important;
    }
</style>
{% endblock %}
